<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JNV School Management — Operations</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="stylesheet" href="../css/students.css">
  <link rel="stylesheet" href="../css/modules.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><span class="logo-text">JNV Portal</span></div>
    <nav class="sidebar-nav"></nav>
    <button class="logout-btn" id="logout-btn">Sign out</button>
  </aside>
  <main class="main">
    <header class="topbar">
      <div><h1 class="page-title">JNV Operations</h1><p class="page-sub">Track MOD reports, hostel, mess, medical, leave, library, maintenance, visitors, inventory, and student welfare.</p></div>
      <div class="topbar-actions"><button class="btn-secondary" id="export-operations-btn">Export CSV</button><button class="btn-primary" id="add-operation-btn">+ Add Record</button></div>
    </header>
    <div class="content">
      <div class="summary-strip" id="operations-summary"></div>
      <div class="filters-bar">
        <input id="search-input" class="filter-input search-input" placeholder="Search title, description, student, assignee…">
        <select id="filter-type" class="filter-input"></select>
        <select id="filter-status" class="filter-input"><option value="">All Statuses</option><option>Open</option><option>In Progress</option><option>Completed</option><option>Closed</option></select>
        <select id="filter-priority" class="filter-input"><option value="">All Priorities</option><option>High</option><option>Medium</option><option>Low</option></select>
        <button class="btn-ghost" id="clear-filters-btn">Clear</button>
      </div>
      <div class="operations-grid" id="operations-list"><p class="empty-state-card">Loading operations…</p></div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="operation-modal" hidden>
  <div class="modal">
    <div class="modal-header"><h2 class="modal-title" id="operation-modal-title">Add Operational Record</h2><button class="modal-close" id="operation-modal-close" aria-label="Close">✕</button></div>
    <form class="modal-form" id="operation-form">
      <div class="form-grid">
        <div class="field-group"><label>Type *</label><select name="type" id="operation-type" required></select></div>
        <div class="field-group"><label>Title *</label><input name="title" required></div>
        <div class="field-group"><label>Event Date</label><input type="date" name="event_date"></div>
        <div class="field-group"><label>Priority</label><select name="priority"><option>Medium</option><option>High</option><option>Low</option></select></div>
        <div class="field-group"><label>Status</label><select name="status"><option>Open</option><option>In Progress</option><option>Completed</option><option>Closed</option></select></div>
        <div class="field-group"><label>Assigned To</label><input name="assigned_to"></div>
        <div class="field-group"><label>Student / Person</label><input name="student_name"></div>
        <div class="field-group"><label>Class / Section</label><input name="class_section" placeholder="Example: 8 A"></div>
        <div class="field-group full-width"><label>Description / Action Taken *</label><textarea name="description" rows="5" required></textarea></div>
      </div>
      <div class="modal-footer"><button type="button" class="btn-ghost" id="operation-modal-cancel">Cancel</button><button type="submit" class="btn-primary" id="operation-submit">Save Record</button></div>
    </form>
  </div>
</div>

<script type="module" src="../js/operations.js"></script>
<script type="module" src="../js/sidebar-role.js"></script>
</body>
</html>
