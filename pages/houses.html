<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JNV School Management — Houses</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <link rel="stylesheet" href="../css/students.css" />
  <link rel="stylesheet" href="../css/modules.css" />
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><span class="logo-text">JNV Portal</span></div>
    <nav class="sidebar-nav">
        <a href="admin-dashboard.html" class="nav-item ">Dashboard</a>
        <a href="students.html" class="nav-item ">Students</a>
        <a href="teachers.html" class="nav-item ">Teachers</a>
        <a href="parents.html" class="nav-item ">Parents</a>
        <a href="attendance.html" class="nav-item ">Attendance</a>
        <a href="grades.html" class="nav-item ">Grades</a>
        <a href="timetable.html" class="nav-item ">Timetable</a>
        <a href="notices.html" class="nav-item ">Notices</a>
        <a href="houses.html" class="nav-item active">Houses</a>
    </nav>
    <button class="logout-btn" id="logout-btn">Sign out</button>
  </aside>
  <main class="main">
    <header class="topbar">
      <div>
        <h1 class="page-title">Houses</h1>
        <p class="page-sub">JNV house-wise overview, house masters, and student strengths.</p>
      </div>
      <div class="topbar-actions"></div>
    </header>
    <div class="content">
      <div class="summary-strip" id="house-summary"></div>
      <div class="house-card-grid" id="houses-grid"></div>
      <div class="module-card" style="margin-top:18px;">
        <div class="module-card-title">House Members</div>
        <div class="filters-bar" style="margin-top:12px;"><select id="filter-house" class="filter-input"></select><button class="btn-ghost" id="clear-filters-btn">Clear</button></div>
        <div class="table-wrap"><table class="data-table"><thead><tr><th>Admission No</th><th>Name</th><th>Class</th><th>Section</th><th>Roll No</th><th>Phone</th></tr></thead><tbody id="house-students-tbody"><tr><td colspan="6" class="table-empty">Loading students...</td></tr></tbody></table></div>
      </div>
    </div>
  </main>
</div>
<script type="module" src="../js/houses.js"></script>
<script type="module" src="../js/sidebar-role.js"></script>
</body>
</html>
