<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JNV School Management — Principal Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo"><span class="logo-text">JNV Portal</span></div>
      <nav class="sidebar-nav">
        <a href="principal-dashboard.html" class="nav-item active">Dashboard</a>
        <a href="students.html" class="nav-item">Students</a>
        <a href="teachers.html" class="nav-item">Teachers</a>
        <a href="parents.html" class="nav-item">Parents</a>
        <a href="attendance.html" class="nav-item">Attendance</a>
        <a href="grades.html" class="nav-item">Grades</a>
        <a href="timetable.html" class="nav-item">Timetable</a>
        <a href="notices.html" class="nav-item">Notices</a>
        <a href="houses.html" class="nav-item">Houses</a>
      </nav>
      <button class="logout-btn" id="logout-btn">Sign out</button>
    </aside>
    <main class="main">
      <header class="topbar">
        <div>
          <h1 class="page-title" id="dashboard-title">Principal Dashboard</h1>
          <p class="page-sub" id="welcome-msg">Welcome back</p>
        </div>
      </header>
      <div class="content" id="dashboard-content">
        <div class="stat-grid">
          <div class="stat-card"><div class="stat-label">Students</div><div class="stat-value">0</div></div>
          <div class="stat-card"><div class="stat-label">Teachers</div><div class="stat-value">0</div></div>
          <div class="stat-card"><div class="stat-label">Parents</div><div class="stat-value">0</div></div>
          <div class="stat-card"><div class="stat-label">Notices</div><div class="stat-value">0</div></div>
        </div>
        <p class="empty-state">Loading live dashboard counts...</p>
      </div>
    </main>
  </div>
  <script type="module" src="../js/admin-dashboard.js"></script>
<script type="module" src="../js/sidebar-role.js"></script>
</body>
</html>
