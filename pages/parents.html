<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JNV School Management — Parents</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <link rel="stylesheet" href="../css/students.css" />
  <link rel="stylesheet" href="../css/modules.css" />
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><span class="logo-text">JNV Portal</span></div>
    <nav class="sidebar-nav">
        <a href="admin-dashboard.html" class="nav-item ">Dashboard</a>
        <a href="students.html" class="nav-item ">Students</a>
        <a href="teachers.html" class="nav-item ">Teachers</a>
        <a href="parents.html" class="nav-item active">Parents</a>
        <a href="attendance.html" class="nav-item ">Attendance</a>
        <a href="grades.html" class="nav-item ">Grades</a>
        <a href="timetable.html" class="nav-item ">Timetable</a>
        <a href="notices.html" class="nav-item ">Notices</a>
        <a href="houses.html" class="nav-item ">Houses</a>
    </nav>
    <button class="logout-btn" id="logout-btn">Sign out</button>
  </aside>
  <main class="main">
    <header class="topbar">
      <div>
        <h1 class="page-title">Parents</h1>
        <p class="page-sub">Manage parent records and connect parents with JNV students.</p>
      </div>
      <div class="topbar-actions"><button class="btn-primary" id="add-parent-btn">+ Add Parent</button></div>
    </header>
    <div class="content">
      <div class="summary-strip" id="parent-summary"></div>
      <div class="filters-bar">
        <input type="text" id="search-input" class="filter-input search-input" placeholder="Search parent, phone, username..." />
        <button class="btn-ghost" id="clear-filters-btn">Clear</button>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr><th>Name</th><th>Username</th><th>Phone</th><th>Email</th><th>Village</th><th>Linked Students</th><th>Actions</th></tr></thead>
          <tbody id="parents-tbody"><tr><td colspan="7" class="table-empty">Loading parents...</td></tr></tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>

      <div class="modal-overlay" id="parent-modal" hidden>
        <div class="modal">
          <div class="modal-header"><h2 class="modal-title" id="modal-title">Add Parent</h2><button class="modal-close" id="modal-close">✕</button></div>
          <form class="modal-form" id="parent-form">
            <div class="form-grid">
              <div class="field-group"><label>Full Name *</label><input name="full_name" required /></div>
              <div class="field-group"><label>Username</label><input name="username" /></div>
              <div class="field-group"><label>Phone</label><input name="phone" /></div>
              <div class="field-group"><label>Email</label><input type="email" name="email" /></div>
              <div class="field-group"><label>Village</label><input name="village" /></div>
              <div class="field-group"><label>Relation</label><select name="relation"><option>Father</option><option>Mother</option><option>Guardian</option></select></div>
              <div class="field-group full-width"><label>Address</label><textarea name="address" rows="2"></textarea></div>
            </div>
            <div class="modal-footer"><button type="button" class="btn-ghost" id="modal-cancel">Cancel</button><button type="submit" class="btn-primary" id="modal-submit">Save Parent</button></div>
          </form>
        </div>
      </div>
    </div>
  </main>
</div>
<script type="module" src="../js/parents.js"></script>
<script type="module" src="../js/sidebar-role.js"></script>
</body>
</html>
